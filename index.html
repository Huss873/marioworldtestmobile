<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paneleiro - Coleta de Dados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.8;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .info-grid {
            display: grid;
            gap: 20px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .info-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .info-card pre {
            font-family: monospace;
            font-size: 12px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 100px;
            white-space: pre-wrap;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Paneleiro - Coleta de Dados</h1>
            <p>Coletando informações de segurança</p>
        </div>
        <div class="content">
            <div class="info-grid">
                <!-- IP Público -->
                <div class="info-card">
                    <h3>IP Público</h3>
                    <pre id="public-ip">Carregando...</pre>
                </div>
                
                <!-- Localização -->
                <div class="info-card">
                    <h3>Localização</h3>
                    <pre id="location">Carregando...</pre>
                </div>
                
                <!-- Rede Wi-Fi -->
                <div class="info-card">
                    <h3>Rede Wi-Fi</h3>
                    <pre id="wifi">Carregando...</pre>
                </div>
                
                <!-- Dispositivo -->
                <div class="info-card">
                    <h3>Dispositivo</h3>
                    <pre id="device">Carregando...</pre>
                </div>
            </div>
        </div>
        <div class="footer">
            <div id="status">Processando...</div>
        </div>
    </div>

    <script>
        // Coleta de IP público
        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById("public-ip").textContent = data.ip;
                return data.ip;
            } catch (error) {
                console.error("Erro ao obter IP:", error);
                document.getElementById("public-ip").textContent = "Erro ao obter IP";
                return null;
            }
        }

        // Coleta de localização
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    showPosition,
                    showError
                );
            } else {
                document.getElementById("location").textContent = "Geolocalização não suportada";
            }
        }

        function showPosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            document.getElementById("location").textContent = 
                `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}\nPrecisão: ${position.coords.accuracy}m`;
        }

        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("location").textContent = "Permissão negada";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("location").textContent = "Localização indisponível";
                    break;
                case error.TIMEOUT:
                    document.getElementById("location").textContent = "Tempo limite";
                    break;
                default:
                    document.getElementById("location").textContent = "Erro desconhecido";
                    break;
            }
        }

        // Coleta de Wi-Fi (simulada)
        function getWiFiInfo() {
            document.getElementById("wifi").textContent = 
                "SSID: Exemplo-WiFi\nBSSID: AA:BB:CC:DD:EE:FF\nCanal: 6";
        }

        // Coleta de dispositivo
        function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const screenRes = `${screen.width}x${screen.height}`;
            const cookieEnabled = navigator.cookieEnabled;
            const language = navigator.language;
            
            document.getElementById("device").textContent = 
                `Plataforma: ${platform}\nResolução: ${screenRes}\nUser-Agent: ${userAgent.substring(0, 50)}...\nCookies: ${cookieEnabled ? 'Habilitados' : 'Desabilitados'}\nIdioma: ${language}`;
        }

        // Função principal
        async function collectAllData() {
            document.getElementById("status").innerHTML = 
                '<div class="loading"></div> Coletando dados...';
            
            try {
                await Promise.all([
                    getPublicIP(),
                    new Promise(resolve => setTimeout(() => {
                        getLocation();
                        resolve();
                    }, 500)),
                    new Promise(resolve => setTimeout(() => {
                        getWiFiInfo();
                        resolve();
                    }, 1000)),
                    new Promise(resolve => setTimeout(() => {
                        getDeviceInfo();
                        resolve();
                    }, 1500))
                ]);
                
                document.getElementById("status").textContent = 
                    "Dados coletados com sucesso!";
            } catch (error) {
                document.getElementById("status").textContent = 
                    "Erro durante coleta: " + error.message;
            }
        }

        // Inicia a coleta quando a página carrega
        window.addEventListener('load', collectAllData);
    </script>
</body>
</html>
