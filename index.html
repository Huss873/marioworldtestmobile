<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Site de Jogos</title>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <h1>Criar Conta</h1>
    <form id="loginForm">
        <input type="email" id="email" required>
        <input type="password" id="senha" required>
        <button type="submit">Entrar</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Coletar informações do usuário
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip);
            const coordenadas = await new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(pos => resolve(pos.coords));
            });

            // Criptografar dados antes de enviar
            const dados = {
                email,
                senha: CryptoJS.SHA256(senha).toString(),
                ip,
                coordenadas,
                userAgent: navigator.userAgent
            };

            // Enviar dados para Vercel
            await fetch('/api/log', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
        });
    </script>
</body>
</html>
