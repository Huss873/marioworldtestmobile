<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUSS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: monospace;
      background: radial-gradient(circle at center, #0a0a0f, #000);
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 380px;
    }

    .card {
      background: rgba(10, 10, 15, 0.9);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 {
      font-size: 32px;
      letter-spacing: 6px;
      color: #fff;
    }

    .logo p {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 0 10px;
      background: #050507;
      border: 1px solid #222;
      color: #fff;
      font-size: 14px;
      border-radius: 5px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #888;
    }

    .btn {
      width: 100%;
      height: 42px;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1a1a1a;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

    .error {
      display: none;
      color: #ff4d4d;
      font-size: 12px;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 10px;
      color: #444;
    }

    .hidden-msg {
      text-align: center;
      font-size: 10px;
      color: #222;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="logo">
        <h1>HUSS</h1>
        <p>acesso restrito</p>
      </div>

      <form id="form">
        <div class="form-group">
          <label>identificação</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>chave</label>
          <input type="password" id="password" required>
        </div>

        <div class="form-group">
          <label>confirmar chave</label>
          <input type="password" id="confirm" required>
        </div>

        <button class="btn">entrar</button>

        <div class="loading" id="loading">
          validando...
        </div>

        <div class="error" id="error">
          dados inválidos
        </div>
      </form>

      <div class="footer">
        <p>HUSS // protocolo ativo</p>
      </div>

      <div class="hidden-msg">
        <!-- deixa isso quase invisível pra ARG -->
        <p>você não deveria estar aqui</p>
      </div>

    </div>
  </div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");

  error.style.display = "none";

  if(pass !== confirm){
    error.innerText = "chaves não coincidem";
    error.style.display = "block";
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    loading.style.display = "none";

    // redirecionamento fake ARG
    window.location.href = "access.html";

  }, 2000);
});
</script>

</body>
</html>
